system:
  name: "SOCIA"
  version: "0.1.0"
  description: "Simulation Orchestration for City Intelligence and Agents"

llm:
  provider: "openai"  # options: openai, nvidia, gemini, anthropic, llama, etc.

# Available LLM providers configuration
llm_providers:
  openai:
    model: "gpt-5"  # options: gpt-4.1, gpt-4o, gpt-4-turbo, gpt-3.5-turbo, gpt-4.1-2025-04-14, etc.
    temperature: 0
    use_responses_api: true
    max_output_tokens: 20000
    api_key: ""  # set via environment variable or keys.py
    timeout: 180  # seconds
    # model: "gpt-4o"
    # temperature: 0
    # use_responses_api: false
    # max_tokens: 4000
  gemini:
    model: "models/gemini-2.5-flash-preview-04-17"  # Must use full path including "models/" prefix
    temperature: 0
    max_tokens: 8192
    api_key: ""  # set via environment variable or keys.py
    timeout: 60  # seconds
  anthropic:
    model: "claude-sonnet-4-20250514"
    temperature: 0
    max_tokens: 20000
    api_key: ""
    timeout: 180  # seconds
  nvidia:
    model: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
    url: "https://integrate.api.nvidia.com/v1/chat/completions"
    temperature: 0
    max_tokens: 20000
    api_key: ""  # set via NVIDIA_API_KEY in keys.py or environment-specific config
    timeout: 180  # seconds
  llama:
    model_path: "./models/llama-2-13b"
    temperature: 0
    max_tokens: 2048
    timeout: 120  # seconds

agents:
  task_understanding:
    enabled: true
    prompt_template: "templates/task_understanding_prompt.txt"
    output_format: "json"
  
  data_analysis:
    enabled: true
    prompt_template: "templates/data_analysis_prompt.txt"
    output_format: "json"
    supported_data_types: ["csv", "json", "geojson", "shapefile"]

  data_analysis_odd:
    enabled: true
    prompt_template: "templates/data_analysis_odd_prompt.txt"
    output_format: "json"
    supported_data_types: ["csv", "json", "geojson", "shapefile"]
  
  model_planning:
    enabled: true
    prompt_template: "templates/model_planning_prompt.txt"
    output_format: "json"
    available_models: ["gravity", "agent_based", "sir", "network", "system_dynamics"]
  
  code_generation:
    enabled: true
    prompt_template: "templates/code_generation_prompt.txt"
    output_format: "python"
    code_style: "pep8"

  code_generation_odd:
    enabled: true
    prompt_template: "templates/code_generation_odd_prompt.txt"
    output_format: "python"
    code_style: "pep8"
    
  code_verification:
    enabled: true
    prompt_template: "templates/code_verification_prompt.txt"
    output_format: "json"
    run_tests: true
    output_dir: "output/verification"
    
  simulation_execution:
    enabled: true
    prompt_template: "templates/simulation_execution_prompt.txt"
    output_format: "json"
    sandbox: "local"  # options: local, docker, cloud
    timeout: 300  # seconds
    
  result_evaluation:
    enabled: true
    prompt_template: "templates/result_evaluation_prompt.txt"
    output_format: "json"
    metrics: ["mse", "mae", "correlation", "distribution_kl", "dard"]
    
  feedback_generation:
    enabled: true
    prompt_template: "templates/feedback_generation_prompt.txt"
    output_format: "json"
    
  iteration_control:
    enabled: true
    prompt_template: "templates/iteration_control_prompt.txt"
    output_format: "json"
    convergence_threshold: 0.05

  codebase_retrieval:
    enabled: true
    output_format: "python"
    codebase_path: "agents/codebase_retrieval/codebase.json"
    
workflow:
  max_iterations: 3
  parallel_execution: false
  save_intermediate_results: true
  
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "socia.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
output:
  save_format: ["python", "json", "visualization"]
  visualization_types: ["agent_trajectories", "heatmaps", "network_graphs", "timeseries"] 
